<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Formulário</h1>
    <form action="form.php" method="post">
    <div>
        <label for="nome">Nome:</label>
        <input type="text" name="Nome" id="nome" maxlength="60">
    </div>
    <div>
        <label for="idade">Idade :</label>
        <input type="number" name="idade" id="idade" nin="1" max="200">
    </div>
    <div>
        <label>Gênero</label>
        <input type="radio" name="genero" id="genero_m" value="m" checked>
        <label for="genero_m">Masculino</label>
        <input type="radio" name="genero" id="genero_f" value="f">
        <label for="genero_f">Feminino</label>
        <input type="radio" name="genero" id="genero_o" value="o">
        <label for="genero_o">Outros</label>
    </div>
    <div>
        <label for="cor">Cor:</label>
        <select name="cor" id="cor">
            <option value="1">Preto</option>
            <option value="2">Amarelo</option>
            <option value="3">Branco</option>
            <option value="4" selected>Vermelho</option>
            <option value="5">Outros</option>
        </select>
    </div>
    <div>
        <label for="telefone">Telefone</label>
        <input type="text" name="Telefone" id="telefone">
    </div>
    <div>
        <label for="altura">Altura</label>
        <input type="number" name="altura" id="altura" min="0.00" max="3.00" step="0.05" value="1.70">
    </div>
    <div>
        <label for="salario">Salário</label>
        <input type="number" name="salario" id="salario" min="1612.00" max="99999.99" step="10" value="1612.00">
    </div>
    <div>
        <label for="email">Email</label>
        <input type="email" name="email" id="email" required>
    </div>
    <div>
        <input type="checkbox" name="promocoes" id="promocoes" value="1" checked>
        <label for="promocoes">Aceito receber Promoções por email</label>
    </div>
    <div>
        <label for="perfil">Perfil</label>
        <textarea name="perfil" id="perfil" rows="5" maxlength="5000"></textarea>
    </div>
    <div>
        <label for="dn">Data de Nascimento:</label>
        <input type="date" name="dn" id="dn" required>
    </div>
    <div>
        <label for="ft">Foto</label>
        <input type="file" name="ft" id="ft">
    </div>
    <div>
        <button type="submit">Salvar Dados</button>
    </div>
    </form>
</body>
</html>
